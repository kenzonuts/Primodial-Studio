name: Pull Request

on:
  pull_request:
    branches: [main, master]

concurrency:
  group: pr-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:unit

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_SITE_URL: https://primordial.studio
          CMS_PROVIDER: static
          PAYLOAD_SECRET: ci-test-secret-min-8-chars

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: End-to-end tests
        run: pnpm test:e2e
        env:
          CI: true
          PLAYWRIGHT_SKIP_WEBSERVER: ""
          NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
          CMS_PROVIDER: static
          PAYLOAD_SECRET: ci-test-secret-min-8-chars

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  notify-failure:
    name: Notify on Failure
    needs: quality
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Failure summary
        run: |
          echo "::error::Pull request quality gates failed. Check lint, typecheck, unit, build, or e2e logs."
